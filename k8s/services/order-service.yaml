apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: bakery
  labels:
    app: order-service
    app.kubernetes.io/part-of: crumb-and-ember
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: order-service
          image: ghcr.io/singhgauravlinux-coder/bakery-swagger/order-service:d1c1a11
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: SERVICE_NAME
              value: "order-service"
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: "info"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bakery-db-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: bakery
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
