name: Build, Analyze, and Update Manifests

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/**"        # manifest-only commits (incl. the auto-update commit) don't rebuild images
      - "README.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ------------------------------------------------------------ build images
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - product-catalog-service
          - inventory-service
          - pricing-service
          - cart-service
          - order-service
          - payment-service
          - delivery-service
          - notification-service
          - review-service
          - search-service
          - recommendation-service
          - promotion-service
          - loyalty-service
          - recipe-service
          - baking-schedule-service
          - supplier-service
          - analytics-service
          - media-service
          - invoice-service
          - api-gateway
          - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ------------------------------------------------------------ sonarqube analysis
  # Runs in parallel with the docker build matrix. Independent of it — analyzes
  # the Java/Maven codebase and reports to SonarQube, unrelated to the per-service
  # image builds above.
  sonar-analysis:
    name: Build and analyze (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.

      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=singhgauravlinux-coder_bakery-swagger_1c30f684-9261-4e30-a071-9d5a75ed8f8b -Dsonar.projectName='bakery-swagger'

  # ---------------------------------------- auto-update image names in k8s/
  # After all images are pushed, rewrite the image: line in every service
  # manifest to ghcr.io/<owner>/<repo>/<service>:<short-sha> and commit the
  # change back. The manifests in git therefore always reference the exact
  # image built from that commit — no manual editing of YOUR_GITHUB_USERNAME.
  update-manifests:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image references in k8s manifests
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY,,}"          # ghcr requires lowercase
          TAG="${GITHUB_SHA::7}"                 # matches metadata-action's short sha
          for manifest in k8s/services/*.yaml; do
            svc="$(basename "$manifest" .yaml)"
            sed -i -E "s|image: .*/${svc}:.*|image: ghcr.io/${REPO}/${svc}:${TAG}|" "$manifest"
            echo "updated ${svc} -> ghcr.io/${REPO}/${svc}:${TAG}"
          done

      - name: Commit updated manifests
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- k8s/services; then
            echo "Image references already up to date — nothing to commit."
            exit 0
          fi
          git add k8s/services
          git commit -m "ci: bump service images to ${GITHUB_SHA::7} [skip ci]"
          git push origin main
